name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # або master, залежно від назви вашої гілки

# Обов'язкові дозволи для уникнення помилки "id-token: write"
permissions:
  contents: read
  pages: write
  id-token: write

# Дозволити одне паралельне розгортання
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Вкажіть шлях до папки збірки, якщо це потрібно (наприклад, './dist' або './build')

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4